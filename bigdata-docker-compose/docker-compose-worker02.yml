x-hadoop-env: &hadoop-env
  CORE_CONF_fs_defaultFS: hdfs://namenode:9000
  CORE_CONF_hadoop_http_staticuser_user: root
  CORE_CONF_hadoop_proxyuser_root_hosts: "*"
  CORE_CONF_hadoop_proxyuser_root_groups: "*"
  HDFS_CONF_dfs_webhdfs_enabled: "true"
  HDFS_CONF_dfs_permissions_enabled: "false"
  HDFS_CONF_dfs_namenode_name_dir: file:///hadoop/dfs/name
  HDFS_CONF_dfs_datanode_data_dir: file:///hadoop/dfs/data
  HDFS_CONF_dfs_client_use_datanode_hostname: "true"
  HDFS_CONF_dfs_datanode_hostname: 100.90.147.36
  HDFS_CONF_dfs_datanode_use_datanode_hostname: "true"
  HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check: "false"
  YARN_CONF_yarn_resourcemanager_hostname: resourcemanager
  YARN_CONF_yarn_resourcemanager_address: resourcemanager:8032
  YARN_CONF_yarn_resourcemanager_scheduler_address: resourcemanager:8030
  YARN_CONF_yarn_resourcemanager_resource___tracker_address: resourcemanager:8031
  YARN_CONF_yarn_resourcemanager_admin_address: resourcemanager:8033
  YARN_CONF_yarn_resourcemanager_webapp_address: resourcemanager:8088
  YARN_CONF_yarn_nodemanager_hostname: 100.90.147.36
  YARN_CONF_yarn_nodemanager_address: nodemanager02:8041
  YARN_CONF_yarn_nodemanager_localizer_address: nodemanager02:8040
  YARN_CONF_yarn_nodemanager_webapp_address: nodemanager02:8042
  YARN_CONF_yarn_nodemanager_resource_memory___mb: 4096
  YARN_CONF_yarn_nodemanager_resource_cpu___vcores: 2
  YARN_CONF_yarn_nodemanager_aux___services: mapreduce_shuffle
  YARN_CONF_yarn_nodemanager_aux___services_mapreduce_shuffle_class: org.apache.hadoop.mapred.ShuffleHandler
  YARN_CONF_yarn_nodemanager_env___whitelist: JAVA_HOME,HADOOP_COMMON_HOME,HADOOP_HDFS_HOME,HADOOP_CONF_DIR,CLASSPATH_PREPEND_DISTCACHE,HADOOP_YARN_HOME,HADOOP_HOME,PATH,LANG,TZ,HADOOP_MAPRED_HOME
  YARN_CONF_yarn_nodemanager_disk___health___checker_max___disk___utilization___per___disk___percentage: 98.5
  YARN_CONF_yarn_scheduler_capacity_root_default_maximum___allocation___mb: 4096
  YARN_CONF_yarn_scheduler_capacity_root_default_maximum___allocation___vcores: 2
  MAPRED_CONF_mapreduce_framework_name: yarn
  MAPRED_CONF_mapreduce_application_classpath: $$HADOOP_MAPRED_HOME/share/hadoop/mapreduce/*,$$HADOOP_MAPRED_HOME/share/hadoop/mapreduce/lib/*
  MAPRED_CONF_yarn_app_mapreduce_am_env: HADOOP_MAPRED_HOME=/opt/hadoop
  MAPRED_CONF_mapreduce_map_env: HADOOP_MAPRED_HOME=/opt/hadoop
  MAPRED_CONF_mapreduce_reduce_env: HADOOP_MAPRED_HOME=/opt/hadoop

x-master-hosts: &master-hosts
  - "namenode:100.98.137.118"
  - "resourcemanager:100.98.137.118"
  - "baoan-master:100.98.137.118"

x-cluster-image: &cluster-image
  image: ghcr.io/baoan1909/hadoop-spark-docker:ubuntu24.04-java21.0.11-hadoop3.4.3-spark4.1.2

services:
  datanode02:
    <<: *cluster-image
    command: datanode
    container_name: datanode02
    hostname: datanode02
    restart: unless-stopped
    ports:
      - "100.90.147.36:9864:9864"
      - "100.90.147.36:9866:9866"
      - "100.90.147.36:9867:9867"
    volumes:
      - datanode02_data:/hadoop/dfs/data
      - ./data:/data
    environment:
      <<: *hadoop-env
      SERVICE_PRECONDITION: namenode:9000 namenode:9870
    extra_hosts: *master-hosts
    networks:
      - worker02_net

  nodemanager02:
    <<: *cluster-image
    command: nodemanager
    container_name: nodemanager02
    hostname: nodemanager02
    restart: unless-stopped
    depends_on:
      - datanode02
    ports:
      - "100.90.147.36:8040:8040"
      - "100.90.147.36:8041:8041"
      - "100.90.147.36:8042:8042"
    volumes:
      - ./data:/data
    environment:
      <<: *hadoop-env
      SERVICE_PRECONDITION: namenode:9000 namenode:9870 resourcemanager:8031 resourcemanager:8088
    extra_hosts: *master-hosts
    networks:
      - worker02_net

  giaduy-slave1:
    <<: *cluster-image
    command: spark-worker
    container_name: giaduy-slave1
    hostname: giaduy-slave1
    restart: unless-stopped
    depends_on:
      - datanode02
      - nodemanager02
    ports:
      - "100.90.147.36:7078:7078"
      - "100.90.147.36:8081:8081"
    volumes:
      - ./data:/data
    environment:
      SPARK_MASTER: spark://baoan-master:7077
      SPARK_WORKER_PORT: 7078
      SPARK_WORKER_WEBUI_PORT: 8081
      SPARK_PUBLIC_DNS: 100.90.147.36
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      SERVICE_PRECONDITION: baoan-master:7077 namenode:9000 resourcemanager:8032
    extra_hosts: *master-hosts
    networks:
      - worker02_net

volumes:
  datanode02_data:

networks:
  worker02_net:
    driver: bridge
